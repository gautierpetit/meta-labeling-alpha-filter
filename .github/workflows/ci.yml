name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black isort ruff mypy pandas-stubs types-PyYAML types-requests

      - name: Lint (ruff, black --check, isort --check-only)
        run: |
          ruff check src
          black --check src
          isort --check-only src

      - name: Type-check (enforced modules only)
        run: |
          mypy --config-file mypy.ini \
               src/signals.py src/sizing.py src/labeling.py src/utils.py src/strategy.py
