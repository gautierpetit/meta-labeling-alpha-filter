[mypy]
python_version = 3.10
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
strict_optional = True
disallow_untyped_defs = True
check_untyped_defs = True
ignore_missing_imports = True
explicit_package_bases = True

# Keep these ENFORCED (execution-critical)
[mypy-src.signals]
[mypy-src.sizing]
[mypy-src.labeling]
[mypy-src.utils]
[mypy-src.strategy]

# Temporarily silence the rest to ship
[mypy-src.evaluation]
ignore_errors = True

[mypy-src.features]
ignore_errors = True

[mypy-src.modeling]
ignore_errors = True

[mypy-src.mlp_modeling]
ignore_errors = True

[mypy-src.analysis]
ignore_errors = True

[mypy-src.main]
ignore_errors = True

[mypy-src.data_loader]
ignore_errors = True

[mypy-src.data_download]
ignore_errors = True
